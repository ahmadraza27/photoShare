name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build React app
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
    
    - name: Copy React to Django
      run: |
        mkdir -p backend/static
        cp -r frontend/build/* backend/static/
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Create Azure config files
      working-directory: ./backend
      run: |
        echo "python-3.11" > runtime.txt
        
        cat > .deployment << 'EOF'
[config]
SCM_DO_BUILD_DURING_DEPLOYMENT = true
EOF
        
        echo "gunicorn photoshare_backend.wsgi:application --bind 0.0.0.0:8000" > startup.txt
        
        # Ensure requirements.txt exists
        if [ ! -f "requirements.txt" ]; then
          cat > requirements.txt << 'REQEOF'
Django>=5.0.1
djangorestframework
django-cors-headers
psycopg2-binary
gunicorn
whitenoise
django-storages[azure]
azure-storage-blob
pillow
REQEOF
        fi
    
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        pip install gunicorn whitenoise
    
    - name: Create deployment package
      working-directory: ./backend
      run: |
        zip -r ../deploy.zip . -x "env/*" "__pycache__/*" "*.pyc" "media/*"
    
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'student-django-api'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D17452D3EFC946F0B4490BB61637C123 }}
        package: ../deploy.zip
