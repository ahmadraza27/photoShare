name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Build React app
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
    
    - name: Copy React to Django
      run: |
        mkdir -p backend/static
        cp -r frontend/build/* backend/static/
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Create Azure config files
      working-directory: ./backend
      run: |
        echo "python-3.11" > runtime.txt
        
        # Create .deployment without heredoc
        echo "[config]" > .deployment
        echo "SCM_DO_BUILD_DURING_DEPLOYMENT = true" >> .deployment
        
        echo "gunicorn photoshare_backend.wsgi:application --bind 0.0.0.0:8000" > startup.txt
        
        # Create requirements.txt without nested heredoc
        if [ ! -f "requirements.txt" ]; then
          echo "Django>=5.0.1" > requirements.txt
          echo "djangorestframework" >> requirements.txt
          echo "django-cors-headers" >> requirements.txt
          echo "psycopg2-binary" >> requirements.txt
          echo "gunicorn" >> requirements.txt
          echo "whitenoise" >> requirements.txt
          echo "django-storages[azure]" >> requirements.txt
          echo "azure-storage-blob" >> requirements.txt
          echo "pillow" >> requirements.txt
        fi
    
    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        pip install gunicorn whitenoise
    
    - name: Create deployment package
      working-directory: ./backend
      run: |
        zip -r ../deploy.zip . -x "env/*" "__pycache__/*" "*.pyc" "media/*"
    
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'student-django-api'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D17452D3EFC946F0B4490BB61637C123 }}
        package: ../deploy.zip
