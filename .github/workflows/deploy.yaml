name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create deployment package
      run: |
        echo "Creating deployment package..."
        
        # 1. Build React
        cd photoshare-frontend
        npm ci
        npm run build
        
        # 2. Copy to Django
        cd ..
        mkdir -p photoshare_backend/static
        cp -r photoshare-frontend/build/* photoshare_backend/static/
        
        # 3. Create required Azure files
        cd photoshare_backend
        echo "python-3.11" > runtime.txt
        
        cat > .deployment << 'EOF'
        [config]
        SCM_DO_BUILD_DURING_DEPLOYMENT = true
        EOF
        
        echo "gunicorn photoshare_backend.wsgi:application --bind 0.0.0.0:8000" > startup.txt
        
        # 4. Create zip
        zip -r ../deploy.zip .
    
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'student-django-api'
        publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D17452D3EFC946F0B4490BB61637C123 }}
        package: deploy.zip
